# Benchmark model matrix
# Each entry defines one model variant to include in the benchmark run.
# Pull all variants with: scripts/pull_models.ps1

benchmark_models:

  - id: llama3.2:3b-instruct-q4_K_M
    name: "Llama 3.2 3B Q4_K_M"
    family: "Llama 3.2"
    params_b: 3
    quant: "Q4_K_M"
    bits: 4
    expected_vram_gb: 2.5
    notes: "Baseline - fastest, weakest reasoning"

  - id: llama3.2:3b-instruct-q8_0
    name: "Llama 3.2 3B Q8_0"
    family: "Llama 3.2"
    params_b: 3
    quant: "Q8_0"
    bits: 8
    expected_vram_gb: 3.5
    notes: "Near-lossless 3B ceiling"

  - id: llama3.1:8b-instruct-q4_K_M
    name: "Llama 3.1 8B Q4_K_M"
    family: "Llama 3.1"
    params_b: 8
    quant: "Q4_K_M"
    bits: 4
    expected_vram_gb: 5.0
    notes: "Well-documented, standard RAG benchmark reference"

  - id: llama3.1:8b-instruct-q8_0
    name: "Llama 3.1 8B Q8_0"
    family: "Llama 3.1"
    params_b: 8
    quant: "Q8_0"
    bits: 8
    expected_vram_gb: 9.0
    notes: "Near-lossless 8B - quality ceiling for this family"

  - id: phi4:14b-q4_K_M
    name: "Phi-4 14B Q4_K_M"
    family: "Phi-4"
    params_b: 14
    quant: "Q4_K_M"
    bits: 4
    expected_vram_gb: 8.5
    notes: "Microsoft - strong instruction following and reasoning"

  - id: qwen3:14b-q4_K_M
    name: "Qwen 3 14B Q4_K_M"
    family: "Qwen 3"
    params_b: 14
    quant: "Q4_K_M"
    bits: 4
    expected_vram_gb: 9.0
    notes: "Production model - hybrid thinking/non-thinking modes, better reasoning than Qwen 2.5"

  # qwen3:14b-q5_K_M tag does not exist on Ollama (verified May 2026).
  # Replaced with Qwen 3 30B Q4_K_M as the quality ceiling for the Qwen family.
  # Pull with: ollama pull qwen3:30b-q4_K_M (~18GB, fits in 16GB VRAM at Q4)
  # SKIP for now — focus benchmark on models already pulled.
  # - id: qwen3:30b-q4_K_M
  #   name: "Qwen 3 30B Q4_K_M"
  #   family: "Qwen 3"
  #   params_b: 30
  #   quant: "Q4_K_M"
  #   bits: 4
  #   expected_vram_gb: 18.0
  #   notes: "Quality ceiling - larger Qwen 3 for quality comparison vs 14B"

  # Gemma 4 (Google, April 2026) - MoE: 4B active / 26B total parameters
  # Tag confirmed from ollama.com/library/gemma4 — instruction-tuned, Q4_K_M
  - id: gemma4:26b-a4b-it-q4_K_M
    name: "Gemma 4 26B (A4B) Q4_K_M"
    family: "Gemma 4"
    params_b: 26        # total; 4B active (MoE, a4b = active-4b)
    active_params_b: 4
    quant: "Q4_K_M"
    bits: 4
    expected_vram_gb: 14.0  # fits in 16GB; ~18GB GGUF file, ~14-16GB runtime
    moe: true
    notes: "MoE - 4B active params, 26B total. Instruction-tuned. Fits 16GB VRAM at Q4_K_M. Vision + tool calling."

  # Llama 4 Scout (Meta, April 2026) - MoE: 17B active / 109B total parameters
  # ACTUAL measured size: 67 GB on disk (Q5 equivalent of 109B total weights).
  # MoE activates only 17B params per forward pass, but ALL 109B weights must
  # be stored. Ollama will offload excess to system RAM (31 GB available).
  # Expect slower TGS than dense 14B due to RAM↔GPU weight paging.
  # The benchmark value: does MoE quality compensate for the speed penalty?
  - id: llama4:scout
    name: "Llama 4 Scout"
    family: "Llama 4"
    params_b: 109       # total; 17B active (MoE)
    active_params_b: 17
    disk_size_gb: 67    # actual measured — NOT estimated
    quant: "Q5_K_M"    # inferred from 67GB / 109B params
    bits: 5
    expected_vram_gb: 16.0   # GPU saturated; remainder (~51GB) offloads to RAM
    moe: true
    notes: "67GB on disk. Requires RAM offloading — TGS will be lower than dense 14B. Benchmark tests MoE quality vs speed tradeoff under RAM-offload conditions."

  - id: mistral:7b-instruct-v0.3-q4_K_M
    name: "Mistral 7B v0.3 Q4_K_M"
    family: "Mistral"
    params_b: 7
    quant: "Q4_K_M"
    bits: 4
    expected_vram_gb: 4.5
    notes: "Sliding window attention - different memory profile"

# Query categories used in the benchmark
# Each category tests a different retrieval challenge
benchmark_query_types:
  - id: short_query_short_context
    description: "Short query, retrieval returns 2 chunks (~500 tokens)"
    chunk_count: 2

  - id: short_query_long_context
    description: "Short query, retrieval returns 10 chunks (~8000 tokens)"
    chunk_count: 10

  - id: multihop_long_context
    description: "Multi-hop query requiring synthesis across multiple chunks"
    chunk_count: 10
