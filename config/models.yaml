# Benchmark model matrix
# Each entry defines one model variant to include in the benchmark run.
# Pull all variants with: scripts/pull_models.ps1
#
# Order: smallest expected_vram_gb first, largest last. The benchmark runner
# iterates this list in order (model-major), so this ordering loads the
# smallest/fastest models first and saves the largest, riskiest model
# (Gemma 4 26B MoE, ~14GB) for the very end to minimize the chance that an
# OOM/driver crash early in the run blocks the rest of the matrix.

benchmark_models:

  - id: llama3.2:3b-instruct-q4_K_M
    name: "Llama 3.2 3B Q4_K_M"
    family: "Llama 3.2"
    params_b: 3
    quant: "Q4_K_M"
    bits: 4
    expected_vram_gb: 2.5
    context_window: 32768  # Ollama default num_ctx (model trained for 131072)
    notes: "Baseline - fastest, weakest reasoning"

  # Granite 4 - hybrid mamba2/transformer MoE (~1B active / 7B total).
  # IBM's instruction-following + tool-calling tuned model, directly relevant
  # to the Phase 2/3 action-engine roadmap. A 2nd MoE architecture alongside
  # Gemma 4 26B, but tiny by comparison.
  - id: granite4:7b-a1b-h
    name: "Granite 4 7B-A1B-H"
    family: "Granite 4"
    params_b: 7
    active_params_b: 1
    quant: "default"
    expected_vram_gb: 4.5
    moe: true
    context_window: 32768  # Ollama default num_ctx (model trained for 1,048,576)
    notes: "Hybrid mamba2 MoE, ~1B active. Tuned for instruction-following and tool calling."

  - id: mistral:7b-instruct-v0.3-q4_K_M
    name: "Mistral 7B v0.3 Q4_K_M"
    family: "Mistral"
    params_b: 7
    quant: "Q4_K_M"
    bits: 4
    expected_vram_gb: 4.5
    context_window: 32768  # = model's trained max (32768)
    notes: "Sliding window attention - different memory profile"

  - id: llama3.1:8b-instruct-q4_K_M
    name: "Llama 3.1 8B Q4_K_M"
    family: "Llama 3.1"
    params_b: 8
    quant: "Q4_K_M"
    bits: 4
    expected_vram_gb: 5.0
    context_window: 32768  # Ollama default num_ctx (model trained for 131072)
    notes: "Well-documented, standard RAG benchmark reference"

  # Qwen2.5-Coder - coding specialist. Gives the HumanEval+ coding suite a
  # real ceiling to compare the generalist models against.
  - id: qwen2.5-coder:7b-instruct-q4_K_M
    name: "Qwen2.5-Coder 7B Q4_K_M"
    family: "Qwen2.5-Coder"
    params_b: 7
    quant: "Q4_K_M"
    bits: 4
    expected_vram_gb: 5.0
    context_window: 32768  # = model's trained max (32768)
    notes: "Coding specialist - reference ceiling for the HumanEval+ suite."

  # DeepSeek-R1 distill - explicit <think> reasoning traces. Tests whether
  # explicit reasoning improves RAG faithfulness/NIAH recall vs. the
  # production model's hybrid thinking mode (Qwen 3).
  - id: deepseek-r1:8b-llama-distill-q4_K_M
    name: "DeepSeek-R1 8B (Llama distill) Q4_K_M"
    family: "DeepSeek-R1"
    params_b: 8
    quant: "Q4_K_M"
    bits: 4
    expected_vram_gb: 5.5
    context_window: 32768  # Ollama default num_ctx (model trained for 131072)
    notes: "Reasoning distill with <think> traces - contrast with Qwen 3 hybrid thinking."

  # Gemma 4 12B (dense) - smaller sibling of the 26B MoE below
  - id: gemma4:12b-it-q4_K_M
    name: "Gemma 4 12B Q4_K_M"
    family: "Gemma 4"
    params_b: 12
    quant: "Q4_K_M"
    bits: 4
    expected_vram_gb: 8.0
    context_window: 32768  # Ollama default num_ctx (model trained for 262144)
    notes: "Dense model - instruction-tuned. Vision + tool calling. 256K context."

  - id: phi4:14b-q4_K_M
    name: "Phi-4 14B Q4_K_M"
    family: "Phi-4"
    params_b: 14
    quant: "Q4_K_M"
    bits: 4
    expected_vram_gb: 8.5
    context_window: 16384  # = model's trained max (16384, below Ollama's 32768 default)
    notes: "Microsoft - strong instruction following and reasoning"

  - id: llama3.1:8b-instruct-q8_0
    name: "Llama 3.1 8B Q8_0"
    family: "Llama 3.1"
    params_b: 8
    quant: "Q8_0"
    bits: 8
    expected_vram_gb: 9.0
    context_window: 32768  # Ollama default num_ctx (model trained for 131072)
    notes: "Near-lossless 8B - quality ceiling for this family"

  - id: qwen3:14b-q4_K_M
    name: "Qwen 3 14B Q4_K_M"
    family: "Qwen 3"
    params_b: 14
    quant: "Q4_K_M"
    bits: 4
    expected_vram_gb: 9.0
    context_window: 32768  # Ollama default num_ctx (model trained for 40960)
    notes: "Production model - hybrid thinking/non-thinking modes, better reasoning than Qwen 2.5"

  # Gemma 4 (Google, April 2026) - MoE: 4B active / 26B total parameters
  # Tag confirmed from ollama.com/library/gemma4 — instruction-tuned, Q4_K_M
  # Largest/riskiest model in the matrix - kept last so a crash here doesn't
  # block the rest of the run.
  - id: gemma4:26b-a4b-it-q4_K_M
    name: "Gemma 4 26B (A4B) Q4_K_M"
    family: "Gemma 4"
    params_b: 26        # total; 4B active (MoE, a4b = active-4b)
    active_params_b: 4
    quant: "Q4_K_M"
    bits: 4
    expected_vram_gb: 14.0  # fits in 16GB; ~18GB GGUF file, ~14-16GB runtime
    moe: true
    context_window: 32768  # Ollama default num_ctx (model trained for 262144)
    notes: "MoE - 4B active params, 26B total. Instruction-tuned. Fits 16GB VRAM at Q4_K_M. Vision + tool calling."

# Query categories used in the benchmark
# Each category tests a different retrieval challenge
benchmark_query_types:
  - id: short_query_short_context
    description: "Short query, retrieval returns 2 chunks (~500 tokens)"
    chunk_count: 2

  - id: short_query_long_context
    description: "Short query, retrieval returns 10 chunks (~8000 tokens)"
    chunk_count: 10

  - id: multihop_long_context
    description: "Multi-hop query requiring synthesis across multiple chunks"
    chunk_count: 10
