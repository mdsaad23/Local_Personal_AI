# Qwen3.5 9B — reasoning-on by default. Ignores `/no_think` but honors
# `reasoning_effort = "none"` in this LM Studio build, which actually skips
# CoT entirely. With reasoning disabled, max_tokens=1500 is plenty.

name              = "qwen/qwen3.5-9b"
base_url          = "http://localhost:1234"
temperature       = 0.0
max_tokens        = 1500
timeout           = 600.0
reasoning_effort  = "none"   # the only thing that works on this model
suppress_thinking = true     # appended anyway; harmless when ignored
